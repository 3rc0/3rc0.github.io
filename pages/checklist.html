<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UniFi Home Security — Project Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  :root {
    --bg:        #080f1a;
    --bg1:       #0d1829;
    --bg2:       #111f36;
    --bg3:       #162540;
    --glass:     rgba(255,255,255,0.04);
    --glass2:    rgba(255,255,255,0.07);
    --border:    rgba(255,255,255,0.08);
    --border2:   rgba(255,255,255,0.13);
    --accent:    #38bdf8;
    --accent2:   #34d399;
    --orange:    #fb923c;
    --red:       #f87171;
    --purple:    #a78bfa;
    --text:      #e2eaf4;
    --text2:     #8ba3bf;
    --text3:     #4d6a85;
    --done-bg:   rgba(52,211,153,0.07);
    --done-text: #34d399;
    --warn-bg:   rgba(251,146,60,0.1);
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html { scroll-behavior:smooth; }
  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 80% 50% at 20% -10%, rgba(56,189,248,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(52,211,153,0.05) 0%, transparent 60%);
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    font-size: 14px;
    padding-bottom: 60px;
  }
  /* Scrollbar */
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--bg3); border-radius:4px; }

  /* Animations */
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  @keyframes checkPop { 0%{transform:scale(0)} 60%{transform:scale(1.3)} 100%{transform:scale(1)} }
  @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes spin { to{stroke-dashoffset:0} }

  .fade-in { animation: fadeIn 0.35s ease forwards; }
  .slide-down { animation: slideDown 0.2s ease forwards; }

  /* Glass card */
  .card {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 16px;
    backdrop-filter: blur(12px);
  }
  .card:hover { border-color: var(--border2); }

  button { cursor:pointer; border:none; outline:none; font-family:inherit; }
  input  { font-family:inherit; outline:none; }
  input:focus { border-color: var(--accent) !important; box-shadow: 0 0 0 2px rgba(56,189,248,0.15); }

  /* Category icons */
  .sec-icon {
    width:32px; height:32px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:16px; flex-shrink:0;
  }

  /* Item row */
  .item-row {
    display:flex; align-items:flex-start; gap:10px;
    padding:11px 14px; cursor:pointer;
    border-bottom:1px solid var(--border);
    transition: background 0.15s;
    position:relative;
  }
  .item-row:last-child { border-bottom:none; }
  .item-row:hover { background:var(--glass2); }
  .item-row.done { background:var(--done-bg); }
  .item-row.done .item-name { color:var(--done-text); text-decoration:line-through; opacity:0.7; }
  .item-row.done .item-model { color:var(--done-text); opacity:0.5; text-decoration:line-through; }
  .item-row.done .item-price { opacity:0.4; text-decoration:line-through; }

  /* Checkbox */
  .cb {
    width:20px; height:20px; border-radius:6px; flex-shrink:0;
    border:2px solid var(--text3); display:flex; align-items:center;
    justify-content:center; margin-top:1px; transition:all 0.2s;
    background:transparent;
  }
  .cb.checked {
    background:var(--accent2); border-color:var(--accent2);
  }
  .cb.checked svg { animation:checkPop 0.25s ease; }

  /* Tags */
  .tag {
    display:inline-flex; align-items:center; gap:3px;
    padding:2px 7px; border-radius:20px; font-size:10px;
    font-weight:600; letter-spacing:0.02em; font-family:'JetBrains Mono',monospace;
  }
  .tag-warn { background:var(--warn-bg); color:var(--orange); border:1px solid rgba(251,146,60,0.3); }
  .tag-free { background:rgba(52,211,153,0.1); color:var(--accent2); border:1px solid rgba(52,211,153,0.2); }
  .tag-info { background:rgba(56,189,248,0.1); color:var(--accent); border:1px solid rgba(56,189,248,0.2); }

  /* Progress ring */
  .ring-wrap { position:relative; width:56px; height:56px; flex-shrink:0; }
  .ring-bg { fill:none; stroke:var(--bg3); stroke-width:4; }
  .ring-fg { fill:none; stroke-width:4; stroke-linecap:round; transform:rotate(-90deg); transform-origin:center; transition:stroke-dashoffset 0.6s ease; }

  /* Dropdown */
  .dropdown-menu {
    position:absolute; top:calc(100% + 8px); right:0;
    background:var(--bg2); border:1px solid var(--border2);
    border-radius:12px; min-width:220px; z-index:100;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    overflow:hidden;
  }
  .dropdown-item {
    display:flex; align-items:center; gap:10px;
    padding:10px 14px; font-size:13px; color:var(--text2);
    cursor:pointer; transition:background 0.15s;
    text-decoration:none;
  }
  .dropdown-item:hover { background:var(--glass2); color:var(--text); }
  .dropdown-item .di-icon { font-size:16px; width:24px; text-align:center; }

  /* Section complete banner */
  .sec-complete {
    background:linear-gradient(135deg,rgba(52,211,153,0.1),rgba(52,211,153,0.05));
    border:1px solid rgba(52,211,153,0.2);
    border-radius:8px; padding:6px 12px; margin:8px 14px;
    font-size:11px; color:var(--accent2); font-weight:600;
    display:flex; align-items:center; gap:6px;
  }

  /* Notification toast */
  .toast {
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:var(--bg2); border:1px solid var(--border2);
    border-radius:20px; padding:8px 18px;
    font-size:12px; font-weight:600; color:var(--accent2);
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
    z-index:999; white-space:nowrap;
    animation:fadeIn 0.2s ease;
  }

  /* Edit inputs */
  .edit-input {
    background:var(--bg1); border:1px solid var(--border2);
    color:var(--text); border-radius:8px; padding:6px 10px;
    font-size:12px; width:100%; transition:all 0.2s;
  }
  .edit-btn {
    padding:5px 12px; border-radius:8px; font-size:11px;
    font-weight:700; transition:all 0.15s;
  }
  .btn-save { background:var(--accent2); color:#0a1628; }
  .btn-cancel { background:var(--bg3); color:var(--text2); border:1px solid var(--border); }
  .btn-add { background:transparent; border:1px dashed var(--border2); color:var(--text3); border-radius:10px; padding:8px; width:100%; font-size:12px; transition:all 0.2s; }
  .btn-add:hover { border-color:var(--accent); color:var(--accent); }

  /* Section header */
  .sec-header {
    display:flex; align-items:center; gap:10px;
    padding:12px 14px; cursor:pointer; user-select:none;
    transition:background 0.15s; border-radius:16px 16px 0 0;
  }
  .sec-header:hover { background:var(--glass2); }

  /* Sticky header */
  .sticky-header {
    position:sticky; top:0; z-index:50;
    background:rgba(8,15,26,0.85);
    backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
  }
</style>
</head>

    { n:36, name:"Alarm Rules Setup", model:"Alarm Manager", detail:"Configure what happens when motion, door open, or sounds are detected — notifications, recording, sirens", price:"FREE", warn:false },
    { n:37, name:"Pair Door Sensors", model:"Bluetooth via U7 Pro", detail:"Pair the 2 UP-SENSE door sensors through the U7 Pro WiFi AP's Bluetooth radio", price:"FREE", warn:false },
    { n:38, name:"Install Window Sensors", model:"USL-Entry ×10", detail:"Stick sensors on all 10 window frames — magnetic, no wiring needed", price:"FREE", warn:false },

    { n:41, name:"Disable Modem WiFi", model:"Xfinity admin panel", detail:"Log into 10.0.0.1 and turn off the XB8's built-in WiFi radio", price:"—", warn:false },
    { n:42, name:"Connect WAN Cable", model:"Cat6 Ethernet", detail:"Run a Cat6 cable from XB8 LAN port → UDM-SE WAN port. This is your internet feed", price:"—", warn:false },
  ]},
];

// ─── API ───────────────────────────────────────────────────────────────────
async function apiGet() {
  try {
    const r = await fetch(`${WORKER_URL}/api/data`);
    return await r.json();
  } catch(e) {
    return {
      sections: JSON.parse(localStorage.getItem("sections")||"null"),
      checks:   JSON.parse(localStorage.getItem("checks")||"{}"),
    };
  }
}
async function apiSet(key, value) {
  try {
    await fetch(`${WORKER_URL}/api/data`, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({key,value}),
    });
  } catch(e) {
    localStorage.setItem(key, JSON.stringify(value));
  }
}

// ─── Progress Ring ─────────────────────────────────────────────────────────
function Ring({pct, size=56, stroke=4, color="#38bdf8"}) {
  const r = (size-stroke*2)/2;
  const circ = 2*Math.PI*r;
  const offset = circ*(1-pct/100);
  return (
    <div className="ring-wrap" style={{width:size,height:size}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle className="ring-bg" cx={size/2} cy={size/2} r={r} strokeWidth={stroke}/>
        <circle className="ring-fg" cx={size/2} cy={size/2} r={r}
          stroke={color} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={offset}
          style={{transformOrigin:`${size/2}px ${size/2}px`,transform:"rotate(-90deg)",transition:"stroke-dashoffset 0.6s ease"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",
        fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,color}}>
        {pct}%
      </div>
    </div>
  );
}

// ─── Main App ──────────────────────────────────────────────────────────────
function App() {
  const [sections,setSections]       = useState(DEFAULT_SECTIONS);
  const [checks,setChecks]           = useState({});
  const [collapsed,setCollapsed]     = useState({});
  const [editMode,setEditMode]       = useState(false);
  const [editingItem,setEditingItem] = useState(null);
  const [editDraft,setEditDraft]     = useState({});
  const [addingSec,setAddingSec]     = useState(null);
  const [newItem,setNewItem]         = useState({name:"",model:"",detail:"",price:"",warn:false});
  const [newSecTitle,setNewSecTitle] = useState("");
  const [loading,setLoading]         = useState(true);
  const [saving,setSaving]           = useState(false);
  const [toast,setToast]             = useState("");
  const [showDropdown,setShowDropdown] = useState(false);
  const [expandedItem,setExpandedItem] = useState(null);
  const toastTimer = useRef(null);
  const dropRef = useRef(null);

  const notify = m => { setToast(m); clearTimeout(toastTimer.current); toastTimer.current=setTimeout(()=>setToast(""),2500); };

  useEffect(()=>{
    apiGet().then(d=>{ if(d.sections)setSections(d.sections); if(d.checks)setChecks(d.checks); setLoading(false); });
  },[]);

  // Close dropdown on outside click
  useEffect(()=>{
    const h = e => { if(dropRef.current&&!dropRef.current.contains(e.target)) setShowDropdown(false); };
    document.addEventListener("mousedown",h);
    return ()=>document.removeEventListener("mousedown",h);
  },[]);

  const saveSecs = async s => { setSaving(true); await apiSet("sections",s); setSaving(false); };
  const saveCks  = async c => { await apiSet("checks",c); };
  const toggleCheck = n => { const nx={...checks,[n]:!checks[n]}; setChecks(nx); saveCks(nx); };
  const toggleSec   = id => setCollapsed(p=>({...p,[id]:!p[id]}));
  const renumber    = secs => { let n=1; return secs.map(s=>({...s,items:s.items.map(i=>({...i,n:n++}))})); };

  const allItems = sections.flatMap(s=>s.items);
  const total=allItems.length, done=allItems.filter(i=>checks[i.n]).length, pct=total?Math.round(done/total*100):0;

  const secProgress = sec => {
    const t=sec.items.length, d=sec.items.filter(i=>checks[i.n]).length;
    return {t,d,pct:t?Math.round(d/t*100):0};
  };

  const startEdit = (si,ii,item) => { setEditingItem({si,ii}); setEditDraft({name:item.name,model:item.model,detail:item.detail||"",price:item.price,warn:item.warn}); };
  const commitEdit = async () => {
    const {si,ii}=editingItem;
    const nx=sections.map((s,i)=>i!==si?s:{...s,items:s.items.map((it,j)=>j!==ii?it:{...it,...editDraft})});
    setSections(nx); setEditingItem(null); await saveSecs(nx); notify("✓ Item updated");
  };
  const deleteItem = async (si,ii) => {
    const nx=renumber(sections.map((s,i)=>i!==si?s:{...s,items:s.items.filter((_,j)=>j!==ii)}).filter(s=>s.items.length>0));
    setSections(nx); await saveSecs(nx); notify("✓ Item removed");
  };
  const commitAdd = async si => {
    if(!newItem.name.trim()) return;
    const maxN=Math.max(0,...sections.flatMap(s=>s.items.map(i=>i.n)));
    const nx=renumber(sections.map((s,i)=>i!==si?s:{...s,items:[...s.items,{n:maxN+1,...newItem}]}));
    setSections(nx); setNewItem({name:"",model:"",detail:"",price:"",warn:false}); setAddingSec(null); await saveSecs(nx); notify("✓ Item added");
  };
  const addSection = async () => {
    if(!newSecTitle.trim()) return;
    const ids="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const nx=[...sections,{id:ids[sections.length]||String(sections.length+1),title:newSecTitle,items:[]}];
    setSections(nx); setNewSecTitle(""); await saveSecs(nx); notify("✓ Section added");
  };
  const deleteSection = async si => { const nx=renumber(sections.filter((_,i)=>i!==si)); setSections(nx); await saveSecs(nx); notify("✓ Section removed"); };
  const resetChecks = async () => { setChecks({}); await saveCks({}); notify("✓ Progress cleared"); };
  const resetAll    = async () => { if(!confirm("Reset everything to default?"))return; setSections(DEFAULT_SECTIONS); setChecks({}); await saveSecs(DEFAULT_SECTIONS); await saveCks({}); notify("✓ Fully reset"); };

  if(loading) return (
    <div style={{height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <div style={{width:40,height:40,border:"3px solid rgba(56,189,248,0.2)",borderTopColor:"#38bdf8",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <span style={{color:"#38bdf8",fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Loading your checklist…</span>
    </div>
  );

  return (
    <div style={{maxWidth:600,margin:"0 auto",padding:"0 12px"}}>

      {/* Toast */}
      {toast && <div className="toast">{toast}</div>}

      {/* ── Sticky Header ── */}
      <div className="sticky-header" style={{padding:"12px 0"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>

          {/* Progress Ring */}
          <Ring pct={pct}/>

          {/* Title */}
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:16,color:"#fff",letterSpacing:"-0.01em",lineHeight:1.2}}>
              Home Security Setup
            </div>
            <div style={{fontSize:12,color:"#8ba3bf",marginTop:2}}>
              {done} of {total} tasks done · Reston, VA
            </div>
            {/* Progress bar */}
            <div style={{height:3,background:"rgba(255,255,255,0.07)",borderRadius:99,marginTop:6,overflow:"hidden"}}>
              <div style={{height:"100%",width:pct+"%",background:"linear-gradient(90deg,#38bdf8,#34d399)",borderRadius:99,transition:"width 0.5s ease"}}/>
            </div>
          </div>

          {/* Right buttons */}
          <div style={{display:"flex",gap:8,flexShrink:0}}>

            {/* Projects dropdown */}
            <div style={{position:"relative"}} ref={dropRef}>
              <button onClick={()=>setShowDropdown(v=>!v)}
                style={{background:"rgba(56,189,248,0.1)",border:"1px solid rgba(56,189,248,0.25)",color:"#38bdf8",borderRadius:10,padding:"7px 10px",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:5}}>
                📋 <span style={{fontSize:10}}>▾</span>
              </button>
              {showDropdown && (
                <div className="dropdown-menu slide-down">
                  <div style={{padding:"10px 14px 6px",fontSize:10,fontWeight:700,color:"#4d6a85",letterSpacing:"0.08em",textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace"}}>Jump to Section</div>
                  {sections.map((sec,si)=>{
                    const {d,t,pct:sp}=secProgress(sec);
                    const meta=SECTION_META[sec.id]||{icon:"📌",color:"#8ba3bf"};
                    return (
                      <div key={sec.id} className="dropdown-item"
                        onClick={()=>{ setCollapsed(p=>({...p,[sec.id]:false})); setShowDropdown(false); setTimeout(()=>document.getElementById("sec-"+sec.id)?.scrollIntoView({behavior:"smooth",block:"start"}),100); }}>
                        <span className="di-icon">{meta.icon}</span>
                        <span style={{flex:1,fontSize:12}}>{sec.title}</span>
                        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:sp===100?"#34d399":"#4d6a85"}}>{d}/{t}</span>
                      </div>
                    );
                  })}
                  <div style={{borderTop:"1px solid rgba(255,255,255,0.06)",margin:"4px 0"}}/>
                  <div className="dropdown-item" onClick={()=>{resetChecks();setShowDropdown(false);}}>
                    <span className="di-icon">↺</span>
                    <span style={{fontSize:12,color:"#fb923c"}}>Reset Progress</span>
                  </div>
                </div>
              )}
            </div>

            {/* Edit toggle */}
            <button onClick={()=>setEditMode(e=>!e)}
              style={{background:editMode?"rgba(251,146,60,0.15)":"rgba(255,255,255,0.05)",border:`1px solid ${editMode?"rgba(251,146,60,0.4)":"rgba(255,255,255,0.1)"}`,color:editMode?"#fb923c":"#8ba3bf",borderRadius:10,padding:"7px 10px",fontSize:12,fontWeight:600}}>
              {editMode?"✓ Done":"✏️"}
            </button>
          </div>
        </div>

        {/* Cost strip */}
        <div style={{display:"flex",gap:8,marginTop:10,overflowX:"auto",paddingBottom:2}}>
          {[["💰","~$4,298","Total cost"],["📅","$0 / year","Subscriptions"],["⚡","~$138 / year","Electricity"]].map(([icon,val,lbl])=>(
            <div key={lbl} style={{flex:1,minWidth:90,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:10,padding:"6px 10px",textAlign:"center",flexShrink:0}}>
              <div style={{fontSize:10}}>{icon}</div>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,color:"#fb923c",marginTop:1}}>{val}</div>
              <div style={{fontSize:9,color:"#4d6a85",marginTop:1}}>{lbl}</div>
            </div>
          ))}
        </div>
        {saving && <div style={{textAlign:"center",fontSize:10,color:"#38bdf8",marginTop:6,fontFamily:"'JetBrains Mono',monospace",animation:"pulse 1s infinite"}}>● saving…</div>}
      </div>

      {/* ── Sections ── */}
      <div style={{marginTop:12,display:"flex",flexDirection:"column",gap:10}}>
        {sections.map((sec,si)=>{
          const meta = SECTION_META[sec.id]||{icon:"📌",color:"#8ba3bf",hint:""};
          const {d,t,pct:sp} = secProgress(sec);
          const isComplete = d===t && t>0;
          const isCollapsed = collapsed[sec.id];

          return (
            <div key={sec.id} id={"sec-"+sec.id} className="card fade-in"
              style={{borderRadius:16,overflow:"hidden",animationDelay:`${si*0.04}s`}}>

              {/* Section Header */}
              <div className="sec-header" onClick={()=>toggleSec(sec.id)}>
                <div className="sec-icon" style={{background:`${meta.color}18`,border:`1px solid ${meta.color}30`}}>
                  {meta.icon}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontWeight:600,fontSize:14,color:isComplete?"#34d399":"#fff"}}>{sec.title}</span>
                    {isComplete && <span style={{fontSize:11}}>✅</span>}
                  </div>
                  <div style={{fontSize:11,color:"#4d6a85",marginTop:1}}>{meta.hint}</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                  {editMode && (
                    <button onClick={e=>{e.stopPropagation();deleteSection(si);}}
                      style={{background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.2)",color:"#f87171",borderRadius:6,padding:"2px 7px",fontSize:11,fontWeight:700}}>✕</button>
                  )}
                  <div style={{textAlign:"right"}}>
                    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:isComplete?"#34d399":"#4d6a85",fontWeight:600}}>{d}/{t}</div>
                    <div style={{height:3,width:40,background:"rgba(255,255,255,0.07)",borderRadius:99,marginTop:3,overflow:"hidden"}}>
                      <div style={{height:"100%",width:sp+"%",background:meta.color,borderRadius:99,transition:"width 0.4s"}}/>
                    </div>
                  </div>
                  <span style={{color:"#4d6a85",fontSize:12,transform:isCollapsed?"rotate(-90deg)":"rotate(0)",transition:"transform 0.2s",display:"inline-block"}}>▾</span>
                </div>
              </div>

              {/* Items */}
              {!isCollapsed && (
                <div style={{borderTop:"1px solid rgba(255,255,255,0.06)"}}>
                  {sec.items.map((item,ii)=>{
                    const isDone = checks[item.n];
                    const isEditing = editingItem?.si===si && editingItem?.ii===ii;
                    const isExpanded = expandedItem===`${si}-${ii}`;

                    return (
                      <div key={item.n} className={`item-row${isDone?" done":""}`}
                        style={{flexDirection:"column",gap:0,cursor:"default"}}>
                        <div style={{display:"flex",alignItems:"flex-start",gap:10,width:"100%"}}
                          onClick={()=>{ if(!editMode&&!isEditing) toggleCheck(item.n); }}>

                          {/* Number */}
                          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,color:isDone?"#34d399":"rgba(56,189,248,0.5)",width:20,flexShrink:0,marginTop:1,textAlign:"right"}}>
                            {item.n}
                          </span>

                          {/* Checkbox */}
                          <div className={`cb${isDone?" checked":""}`}
                            onClick={e=>{e.stopPropagation();toggleCheck(item.n);}}>
                            {isDone && (
                              <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
                                <path d="M1 4L4 7.5L10 1" stroke="#0a1628" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                              </svg>
                            )}
                          </div>

                          {/* Content */}
                          {isEditing ? (
                            <div style={{flex:1,display:"flex",flexDirection:"column",gap:6}} onClick={e=>e.stopPropagation()}>
                              <input className="edit-input" value={editDraft.name} onChange={e=>setEditDraft(p=>({...p,name:e.target.value}))} placeholder="Name"/>
                              <input className="edit-input" value={editDraft.model} onChange={e=>setEditDraft(p=>({...p,model:e.target.value}))} placeholder="Model"/>
                              <input className="edit-input" value={editDraft.detail||""} onChange={e=>setEditDraft(p=>({...p,detail:e.target.value}))} placeholder="Description for users"/>
                              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                                <input className="edit-input" style={{width:80}} value={editDraft.price} onChange={e=>setEditDraft(p=>({...p,price:e.target.value}))} placeholder="Price"/>
                                <label style={{fontSize:11,color:"#8ba3bf",display:"flex",alignItems:"center",gap:4,cursor:"pointer"}}>
                                  <input type="checkbox" checked={editDraft.warn} onChange={e=>setEditDraft(p=>({...p,warn:e.target.checked}))}/>⚠️ Pending
                                </label>
                              </div>
                              <div style={{display:"flex",gap:6}}>
                                <button className="edit-btn btn-save" onClick={commitEdit}>Save</button>
                                <button className="edit-btn btn-cancel" onClick={()=>setEditingItem(null)}>Cancel</button>
                              </div>
                            </div>
                          ) : (
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                                <span className="item-name" style={{fontWeight:600,fontSize:13,color:isDone?"#34d399":"#fff",lineHeight:1.3}}>{item.name}</span>
                                {item.warn && <span className="tag tag-warn">⚠ Pending</span>}
                                {item.price==="FREE" && <span className="tag tag-free">FREE</span>}
                              </div>
                              <div className="item-model" style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"#38bdf8",marginTop:2,opacity:isDone?0.5:0.8}}>{item.model}</div>
                              {item.detail && (
                                <div onClick={e=>{e.stopPropagation();setExpandedItem(isExpanded?null:`${si}-${ii}`);}}
                                  style={{fontSize:11,color:isExpanded?"#8ba3bf":"#4d6a85",marginTop:3,lineHeight:1.5,cursor:"pointer",display:"flex",alignItems:"flex-start",gap:4}}>
                                  <span style={{flexShrink:0,marginTop:1,fontSize:9,color:"#38bdf8"}}>{isExpanded?"▾":"▸"}</span>
                                  <span>{isExpanded?item.detail:"What is this?"}</span>
                                </div>
                              )}
                            </div>
                          )}

                          {/* Right side */}
                          {!isEditing && (
                            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
                              <span className="item-price" style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,color:item.price==="FREE"?"#34d399":item.price==="—"?"#4d6a85":"#fb923c",whiteSpace:"nowrap"}}>
                                {item.price}
                              </span>
                              {editMode && (
                                <div style={{display:"flex",gap:4}}>
                                  <button onClick={e=>{e.stopPropagation();startEdit(si,ii,item);}}
                                    style={{background:"rgba(56,189,248,0.1)",border:"1px solid rgba(56,189,248,0.2)",color:"#38bdf8",borderRadius:5,padding:"2px 6px",fontSize:11}}>✏</button>
                                  <button onClick={e=>{e.stopPropagation();deleteItem(si,ii);}}
                                    style={{background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.2)",color:"#f87171",borderRadius:5,padding:"2px 6px",fontSize:11}}>✕</button>
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}

                  {/* Add item */}
                  {editMode && (
                    <div style={{padding:"8px 14px",borderTop:"1px solid rgba(255,255,255,0.05)"}}>
                      {addingSec===si ? (
                        <div style={{display:"flex",flexDirection:"column",gap:6}} onClick={e=>e.stopPropagation()}>
                          <input className="edit-input" value={newItem.name} placeholder="Item name *" onChange={e=>setNewItem(p=>({...p,name:e.target.value}))}/>
                          <input className="edit-input" value={newItem.model} placeholder="Model / spec" onChange={e=>setNewItem(p=>({...p,model:e.target.value}))}/>
                          <input className="edit-input" value={newItem.detail} placeholder="Plain English description for users" onChange={e=>setNewItem(p=>({...p,detail:e.target.value}))}/>
                          <div style={{display:"flex",gap:6,alignItems:"center"}}>
                            <input className="edit-input" style={{width:80}} value={newItem.price} placeholder="Price" onChange={e=>setNewItem(p=>({...p,price:e.target.value}))}/>
                            <label style={{fontSize:11,color:"#8ba3bf",display:"flex",alignItems:"center",gap:4,cursor:"pointer"}}>
                              <input type="checkbox" checked={newItem.warn} onChange={e=>setNewItem(p=>({...p,warn:e.target.checked}))}/>⚠️
                            </label>
                            <button className="edit-btn btn-save" onClick={()=>commitAdd(si)}>Add</button>
                            <button className="edit-btn btn-cancel" onClick={()=>{setAddingSec(null);setNewItem({name:"",model:"",detail:"",price:"",warn:false});}}>✕</button>
                          </div>
                        </div>
                      ) : (
                        <button className="btn-add" onClick={()=>setAddingSec(si)}>+ Add item to {sec.title}</button>
                      )}
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}

        {/* Add section */}
        {editMode && (
          <div className="card" style={{padding:"12px 14px",borderStyle:"dashed"}}>
            <div style={{fontSize:11,color:"#4d6a85",marginBottom:8,fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",letterSpacing:"0.06em"}}>+ New Section</div>
            <div style={{display:"flex",gap:8}}>
              <input className="edit-input" style={{flex:1}} value={newSecTitle} placeholder="Section title (e.g. Cabling)" onChange={e=>setNewSecTitle(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addSection()}/>
              <button className="edit-btn btn-save" onClick={addSection} style={{padding:"6px 14px"}}>Add</button>
            </div>
          </div>
        )}

        {/* Bottom actions */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:4}}>
          <button onClick={resetChecks}
            style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",color:"#4d6a85",padding:10,borderRadius:12,fontSize:12,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}}>
            ↺ Reset Progress
          </button>
          <button onClick={resetAll}
            style={{background:"rgba(248,113,113,0.06)",border:"1px solid rgba(248,113,113,0.2)",color:"#f87171",padding:10,borderRadius:12,fontSize:12,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}}>
            ⚠ Reset All
          </button>
        </div>

        <div style={{textAlign:"center",padding:"8px 0 16px",fontSize:10,color:"#4d6a85",fontFamily:"'JetBrains Mono',monospace"}}>
          3rc0.github.io · Cloudflare Workers KV · Shared sync
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
