<style>
/* ── Reset & Base ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }

:root {
  --bg:       #080f1a;
  --bg1:      #0d1829;
  --bg2:      #111f36;
  --bg3:      #162540;
  --glass:    rgba(255,255,255,0.04);
  --glass2:   rgba(255,255,255,0.07);
  --border:   rgba(255,255,255,0.08);
  --border2:  rgba(255,255,255,0.14);
  --accent:   #38bdf8;
  --green:    #34d399;
  --orange:   #fb923c;
  --red:      #f87171;
  --purple:   #a78bfa;
  --text:     #e2eaf4;
  --text2:    #8ba3bf;
  --text3:    #4d6a85;
  --done-bg:  rgba(52,211,153,0.07);
  --warn-bg:  rgba(251,146,60,0.1);
  --radius:   14px;
  --font:     'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono:     'JetBrains Mono', 'Fira Code', monospace;
}

#checklist-app {
  font-family: var(--font);
  font-size: 16px;
  line-height: 1.5;
  color: var(--text);
  max-width: 680px;
  margin: 0 auto;
  padding: 0 0 48px;
}

/* ── Animations ──────────────────────────────────── */
@keyframes fadeUp   { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes popIn    { 0%{transform:scale(0.6)} 70%{transform:scale(1.15)} 100%{transform:scale(1)} }
@keyframes shimmer  { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
@keyframes spin     { to{transform:rotate(360deg)} }

.fade-up { animation: fadeUp 0.3s ease both; }

/* ── Progress Header ─────────────────────────────── */
.cl-header {
  background: linear-gradient(135deg, #0f2240 0%, #0a1628 100%);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.cl-header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--green), var(--purple), var(--orange));
}
.cl-header-top {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.cl-ring { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
.cl-ring svg { transform: rotate(-90deg); }
.cl-ring-label {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 13px; font-weight: 700;
  color: var(--accent);
}
.cl-title-block { flex: 1; min-width: 0; }
.cl-title-block h2 {
  font-size: 20px; font-weight: 700; color: #fff;
  margin: 0 0 2px; letter-spacing: -0.01em;
}
.cl-title-block p { font-size: 14px; color: var(--text2); margin: 0 0 8px; }
.cl-progress-bar {
  height: 4px; background: rgba(255,255,255,0.08);
  border-radius: 99px; overflow: hidden;
}
.cl-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--green));
  border-radius: 99px;
  transition: width 0.5s ease;
}
.cl-actions {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-top: 16px; padding-top: 14px;
  border-top: 1px solid var(--border);
}
.cl-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 10px;
  font-family: var(--font); font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.15s; border: none;
  text-decoration: none;
}
.cl-btn-primary  { background: rgba(56,189,248,0.12); color: var(--accent); border: 1px solid rgba(56,189,248,0.3); }
.cl-btn-success  { background: rgba(52,211,153,0.12); color: var(--green);  border: 1px solid rgba(52,211,153,0.3); }
.cl-btn-warning  { background: rgba(251,146,60,0.12);  color: var(--orange); border: 1px solid rgba(251,146,60,0.3); }
.cl-btn-danger   { background: rgba(248,113,113,0.08); color: var(--red);   border: 1px solid rgba(248,113,113,0.2); }
.cl-btn-ghost    { background: rgba(255,255,255,0.04); color: var(--text2); border: 1px solid var(--border); }
.cl-btn:hover    { opacity: 0.85; transform: translateY(-1px); }
.cl-btn-edit-on  { background: rgba(251,146,60,0.15); color: var(--orange); border: 1px solid rgba(251,146,60,0.4); }

/* ── Cost Strip ───────────────────────────────────── */
.cl-costs {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 8px; margin-bottom: 16px;
}
.cl-cost-card {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 10px 12px;
  text-align: center;
}
.cl-cost-val { font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--orange); }
.cl-cost-lbl { font-size: 12px; color: var(--text3); margin-top: 2px; }

/* ── Section ──────────────────────────────────────── */
.cl-section {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.cl-section:hover { border-color: var(--border2); }
.cl-section.complete { border-color: rgba(52,211,153,0.25); }

.cl-sec-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; cursor: pointer;
  user-select: none; transition: background 0.15s;
}
.cl-sec-header:hover { background: var(--glass2); }

.cl-sec-icon {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.cl-sec-info { flex: 1; min-width: 0; }
.cl-sec-title {
  font-size: 15px; font-weight: 600; color: #fff;
  margin: 0 0 1px; line-height: 1.3;
}
.cl-sec-hint { font-size: 12px; color: var(--text3); }
.cl-sec-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.cl-sec-count { font-family: var(--mono); font-size: 12px; color: var(--text3); font-weight: 600; }
.cl-sec-count.done { color: var(--green); }
.cl-chevron {
  color: var(--text3); font-size: 12px;
  transition: transform 0.2s; display: inline-block;
}
.cl-chevron.open { transform: rotate(180deg); }

/* ── Mini progress bar in section header ─────────── */
.cl-sec-bar {
  width: 48px; height: 3px;
  background: rgba(255,255,255,0.07);
  border-radius: 99px; overflow: hidden;
}
.cl-sec-bar-fill { height: 100%; border-radius: 99px; transition: width 0.4s; }

/* ── Items ────────────────────────────────────────── */
.cl-items { border-top: 1px solid rgba(255,255,255,0.06); }

.cl-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  cursor: pointer; transition: background 0.15s;
  position: relative;
}
.cl-item:last-child { border-bottom: none; }
.cl-item:hover { background: var(--glass2); }
.cl-item.done { background: var(--done-bg); }
.cl-item.done .cl-item-name  { text-decoration: line-through; color: var(--green); opacity: 0.7; }
.cl-item.done .cl-item-model { text-decoration: line-through; opacity: 0.4; }
.cl-item.done .cl-item-price { opacity: 0.35; text-decoration: line-through; }

/* Number */
.cl-item-num {
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  color: rgba(56,189,248,0.4); width: 22px;
  text-align: right; flex-shrink: 0; padding-top: 2px;
}
.done .cl-item-num { color: var(--green); opacity: 0.6; }

/* Checkbox */
.cl-cb {
  width: 22px; height: 22px; border-radius: 7px;
  border: 2px solid var(--text3); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; background: transparent; margin-top: 0;
}
.cl-cb.on { background: var(--green); border-color: var(--green); }
.cl-cb.on svg { animation: popIn 0.25s ease; }

/* Content */
.cl-item-body { flex: 1; min-width: 0; }
.cl-item-name {
  font-size: 15px; font-weight: 600; color: #fff;
  line-height: 1.35; display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
}
.cl-item-model {
  font-family: var(--mono); font-size: 12px;
  color: var(--accent); margin-top: 2px; opacity: 0.85;
}
.cl-item-detail {
  font-size: 13px; color: var(--text2); margin-top: 4px;
  line-height: 1.55; display: none;
}
.cl-item-detail.open { display: block; }
.cl-expand-btn {
  font-size: 12px; color: var(--text3); cursor: pointer;
  margin-top: 3px; display: inline-flex; align-items: center; gap: 3px;
  background: none; border: none; padding: 0; font-family: var(--font);
  transition: color 0.15s;
}
.cl-expand-btn:hover { color: var(--accent); }

/* Price */
.cl-item-price {
  font-family: var(--mono); font-size: 13px; font-weight: 700;
  white-space: nowrap; flex-shrink: 0; padding-top: 2px;
  transition: color 0.2s;
}
.price-free { color: var(--green); }
.price-dash { color: var(--text3); }
.price-cost { color: var(--orange); }

/* Tags */
.cl-tag {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.02em;
  font-family: var(--mono); flex-shrink: 0;
}
.tag-warn { background: var(--warn-bg); color: var(--orange); border: 1px solid rgba(251,146,60,0.3); }
.tag-free { background: rgba(52,211,153,0.1); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }

/* Edit controls */
.cl-edit-btns { display: flex; gap: 4px; flex-shrink: 0; margin-top: 1px; }
.cl-edit-btn {
  padding: 3px 8px; border-radius: 6px; font-size: 12px;
  font-weight: 700; cursor: pointer; border: none;
  transition: all 0.15s; font-family: var(--font);
}
.cl-edit-btn.edit { background: rgba(56,189,248,0.12); color: var(--accent); border: 1px solid rgba(56,189,248,0.25); }
.cl-edit-btn.del  { background: rgba(248,113,113,0.1);  color: var(--red);   border: 1px solid rgba(248,113,113,0.2); }

/* Edit form */
.cl-edit-form { display: flex; flex-direction: column; gap: 8px; flex: 1; }
.cl-input {
  background: rgba(255,255,255,0.06); border: 1px solid var(--border2);
  color: var(--text); border-radius: 8px; padding: 8px 12px;
  font-size: 14px; width: 100%; font-family: var(--font);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.cl-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(56,189,248,0.12); }
.cl-form-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.cl-form-row .cl-input { flex: 1; min-width: 80px; }

/* Add item */
.cl-add-row { padding: 8px 16px; border-top: 1px solid rgba(255,255,255,0.05); }
.cl-add-btn {
  width: 100%; padding: 9px; background: transparent;
  border: 1px dashed rgba(255,255,255,0.12); border-radius: 10px;
  color: var(--text3); font-size: 14px; cursor: pointer;
  font-family: var(--font); transition: all 0.2s;
}
.cl-add-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Add section */
.cl-add-section {
  background: var(--glass); border: 1px dashed var(--border2);
  border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px;
}

/* Section complete badge */
.cl-sec-complete {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; font-weight: 700; color: var(--green);
}

/* Toast */
.cl-toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #162540; border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px; padding: 10px 20px;
  font-size: 14px; font-weight: 600; color: var(--green);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  z-index: 9999; white-space: nowrap;
  animation: fadeUp 0.2s ease;
}

/* Saving indicator */
.cl-saving {
  font-family: var(--mono); font-size: 11px; color: var(--accent);
  text-align: center; padding: 4px; opacity: 0.7;
}

/* Section del button */
.cl-sec-del { padding: 2px 7px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }

/* Footer */
.cl-footer {
  text-align: center; padding: 24px 0 8px;
  font-size: 13px; color: var(--text3);
  font-family: var(--mono);
}

/* ── PRINT STYLES ─────────────────────────────────── */
@media print {
  body > *:not(#checklist-app):not([id]) { display: none !important; }
  .cl-actions, .cl-btn, .cl-edit-btns, .cl-add-row,
  .cl-add-section, .cl-toast, .cl-saving { display: none !important; }
  #checklist-app { color: #000 !important; background: #fff !important; }
  .cl-header { background: #f8fafc !important; border: 1px solid #ddd !important; }
  .cl-header::before { display: none; }
  .cl-section { border: 1px solid #ddd !important; background: #fff !important; break-inside: avoid; margin-bottom: 8px; }
  .cl-sec-header { background: #f1f5f9 !important; }
  .cl-sec-title, .cl-item-name { color: #111 !important; }
  .cl-item-model { color: #2563eb !important; }
  .cl-sec-hint, .cl-item-detail { color: #555 !important; }
  .cl-item-detail { display: block !important; }
  .cl-item-detail.open { display: block !important; }
  .cl-item-price { color: #d97706 !important; }
  .cl-item-num { color: #94a3b8 !important; }
  .price-free { color: #059669 !important; }
  .cl-cb { border-color: #94a3b8 !important; }
  .cl-cb.on { background: #059669 !important; border-color: #059669 !important; }
  .done .cl-item-name, .done .cl-item-model { color: #059669 !important; }
  .cl-costs { display: none; }
  .cl-ring svg circle:last-child { stroke: #2563eb !important; }
  .cl-ring-label { color: #2563eb !important; }
  .cl-title-block h2 { color: #111 !important; }
  .cl-title-block p  { color: #555 !important; }
  .tag-warn { background: #fff7ed !important; color: #d97706 !important; }
  .tag-free { background: #f0fdf4 !important; color: #059669 !important; }
  .cl-sec-count { color: #555 !important; }
  .cl-sec-count.done { color: #059669 !important; }
  .cl-items { border-top: 1px solid #e2e8f0 !important; }
  .cl-item { border-bottom: 1px solid #f1f5f9 !important; }
  .cl-footer { color: #94a3b8 !important; border-top: 1px solid #e2e8f0; margin-top: 16px; padding-top: 12px; }
  @page { margin: 15mm; size: A4; }
}

/* ── Mobile ───────────────────────────────────────── */
@media (max-width: 480px) {
  .cl-costs { grid-template-columns: repeat(3,1fr); }
  .cl-cost-val { font-size: 12px; }
  .cl-cost-lbl { font-size: 11px; }
  .cl-btn { font-size: 13px; padding: 7px 11px; }
  .cl-item { padding: 11px 12px; }
  .cl-item-name { font-size: 14px; }
  .cl-item-detail { font-size: 13px; }
  .cl-title-block h2 { font-size: 18px; }
  .cl-sec-header { padding: 12px; }
  .cl-sec-icon { width: 32px; height: 32px; font-size: 16px; }
}
</style>

    { n:39, name:"Geofencing Setup", model:"UniFi Protect", detail:"Optional. System automatically arms when you leave home and disarms when you return, based on your phone's location.", price:"FREE", warn:false },
  ]},
  { id:"J", title:"Internet Connection", items:[
    { n:40, name:"Mount Modem in Rack", model:"Xfinity XB8", detail:"Place the XB8 modem flat on the vented shelf in the rack. Ensure airflow is not blocked.", price:"—", warn:false },
    { n:41, name:"Disable Modem WiFi", model:"Xfinity admin panel", detail:"Log into 10.0.0.1 and turn off the XB8's internal WiFi radio so it acts as a pure modem.", price:"—", warn:false },
    { n:42, name:"Connect Internet Cable", model:"Cat6 Ethernet", detail:"Run a Cat6 Ethernet cable from the XB8 LAN port to the UDM-SE WAN port. This carries your internet feed.", price:"—", warn:false },

];

/* ── API ─────────────────────────────────────────── */
async function apiGet() {
  try {
    const r = await fetch(`${WORKER_URL}/api/data`);
    const d = await r.json();
    return d;
  } catch(e) {
    return {
      sections: JSON.parse(localStorage.getItem("cl_sections")||"null"),
      checks:   JSON.parse(localStorage.getItem("cl_checks")||"{}"),
    };
  }
}
async function apiSet(key, val) {
  try {
    await fetch(`${WORKER_URL}/api/data`, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({key, value:val}),
    });
  } catch(e) {
    localStorage.setItem("cl_"+key, JSON.stringify(val));
  }
}

/* ── Progress Ring ───────────────────────────────── */
function renderRing(pct){
  const size=64, stroke=5;
  const r=(size-stroke*2)/2;
  const circ=2*Math.PI*r;
  const color = pct===100 ? "#34d399" : "#38bdf8";

  return `
  <div class="cl-ring">
    <svg width="${size}" height="${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none"
        stroke="rgba(255,255,255,0.07)" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none"
        stroke="${color}" stroke-width="${stroke}"
        stroke-dasharray="${circ}"
        stroke-dashoffset="${circ*(1-pct/100)}"
        style="transform-origin:32px 32px; transform:rotate(-90deg); transition:stroke-dashoffset 0.6s ease"/>
    </svg>
    <div class="cl-ring-label">${pct}%</div>
  </div>`;
}

/* ── App ─────────────────────────────────────────── */
function App() {
  const [secs,setSecs]             = useState(DEFAULTS);
  const [checks,setChecks]         = useState({});
  const [collapsed,setCollapsed]   = useState({});
  const [editMode,setEditMode]     = useState(false);
  const [editItem,setEditItem]     = useState(null);
  const [editDraft,setEditDraft]   = useState({});
  const [addingSec,setAddingSec]   = useState(null);
  const [newItem,setNewItem]       = useState({name:"",model:"",detail:"",price:"",warn:false});
  const [newSecTitle,setNewSecTitle] = useState("");
  const [loading,setLoading]       = useState(true);
  const [saving,setSaving]         = useState(false);
  const [toast,setToast]           = useState("");
  const [expanded,setExpanded]     = useState({});
  const toastRef = useRef(null);

  const notify = m => {
    setToast(m);
    clearTimeout(toastRef.current);
    toastRef.current = setTimeout(()=>setToast(""), 2500);
  };

  useEffect(()=>{
    apiGet().then(d=>{
      if(d?.sections) setSecs(d.sections);
      if(d?.checks)   setChecks(d.checks);
      setLoading(false);
    });
  },[]);

  const saveSecs = async s => { setSaving(true); await apiSet("sections",s); setSaving(false); };
  const saveCks  = async c => { await apiSet("checks",c); };

  const toggleCheck = n => {
    const nx = {...checks,[n]:!checks[n]};
    setChecks(nx); saveCks(nx);
  };
  const toggleSec  = id => setCollapsed(p=>({...p,[id]:!p[id]}));
  const toggleExp  = key => setExpanded(p=>({...p,[key]:!p[key]}));
  const renumber   = s => { let n=1; return s.map(sec=>({...sec,items:sec.items.map(i=>({...i,n:n++}))})); };

  const allItems = secs.flatMap(s=>s.items);
  const total=allItems.length, done=allItems.filter(i=>checks[i.n]).length;
  const pct = total ? Math.round(done/total*100) : 0;
  const secProg = sec => { const t=sec.items.length,d=sec.items.filter(i=>checks[i.n]).length; return {t,d,pct:t?Math.round(d/t*100):0}; };

  const startEdit = (si,ii,item) => { setEditItem({si,ii}); setEditDraft({...item}); };
  const commitEdit = async () => {
    const {si,ii}=editItem;
    const nx=secs.map((s,i)=>i!==si?s:{...s,items:s.items.map((it,j)=>j!==ii?it:{...it,...editDraft})});
    setSecs(nx); setEditItem(null); await saveSecs(nx); notify("✓ Item updated");
  };
  const delItem = async (si,ii) => {
    const nx=renumber(secs.map((s,i)=>i!==si?s:{...s,items:s.items.filter((_,j)=>j!==ii)}).filter(s=>s.items.length>0));
    setSecs(nx); await saveSecs(nx); notify("✓ Item removed");
  };
  const commitAdd = async si => {
    if(!newItem.name.trim()) return;
    const maxN=Math.max(0,...secs.flatMap(s=>s.items.map(i=>i.n)));
    const nx=renumber(secs.map((s,i)=>i!==si?s:{...s,items:[...s.items,{n:maxN+1,...newItem}]}));
    setSecs(nx); setNewItem({name:"",model:"",detail:"",price:"",warn:false}); setAddingSec(null);
    await saveSecs(nx); notify("✓ Item added");
  };
  const addSec = async () => {
    if(!newSecTitle.trim()) return;
    const ids="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const nx=[...secs,{id:ids[secs.length]||String(secs.length+1),title:newSecTitle,items:[]}];
    setSecs(nx); setNewSecTitle(""); await saveSecs(nx); notify("✓ Section added");
  };
  const delSec = async si => {
    const nx=renumber(secs.filter((_,i)=>i!==si));
    setSecs(nx); await saveSecs(nx); notify("✓ Section removed");
  };
  const resetChecks = async () => { setChecks({}); await saveCks({}); notify("✓ Progress cleared"); };
  const resetAll    = async () => {
    if(!window.confirm("Reset everything back to default? This cannot be undone.")) return;
    setSecs(DEFAULTS); setChecks({}); await saveSecs(DEFAULTS); await saveCks({}); notify("✓ Fully reset to default");
  };
  const printPDF = () => {
    setCollapsed({});
    setTimeout(()=>window.print(), 300);
  };

  if(loading) return (
    <div style={{textAlign:"center",padding:"60px 0",color:"var(--accent)",fontFamily:"var(--mono)",fontSize:"14px"}}>
      <div style={{width:28,height:28,border:"3px solid rgba(56,189,248,0.2)",borderTopColor:"#38bdf8",borderRadius:"50%",animation:"spin 0.8s linear infinite",margin:"0 auto 12px"}}/>
      Loading your checklist…
    </div>
  );

  return (
    <>
      {toast && <div className="cl-toast">{toast}</div>}

      {/* ── Header ── */}
      <div className="cl-header fade-up">
        <div className="cl-header-top">
          <Ring pct={pct}/>
          <div className="cl-title-block">
            <h2>Home Security Setup</h2>
            <p>{done} of {total} tasks completed · Reston, VA 2025</p>
            <div className="cl-progress-bar">
              <div className="cl-progress-fill" style={{width:pct+"%"}}/>
            </div>
          </div>
        </div>
        <div className="cl-actions">
          <button className={`cl-btn ${editMode?"cl-btn-edit-on":"cl-btn-ghost"}`} onClick={()=>setEditMode(e=>!e)}>
            {editMode ? "✓ Done Editing" : "✏️ Edit Checklist"}
          </button>
          <button className="cl-btn cl-btn-success" onClick={printPDF}>
            🖨️ Print / Save PDF
          </button>
          <button className="cl-btn cl-btn-ghost" onClick={resetChecks}>↺ Reset Progress</button>
          <button className="cl-btn cl-btn-danger" onClick={resetAll}>⚠ Reset All</button>
        </div>
        {saving && <div className="cl-saving">● syncing…</div>}
      </div>

      {/* ── Cost Summary ── */}
      <div className="cl-costs">
        {[["💰","~$4,298","Total incl. tax"],["📅","$0 / yr","No subscriptions"],["⚡","~$138 / yr","Electricity"]].map(([icon,val,lbl])=>(
          <div key={lbl} className="cl-cost-card">
            <div style={{fontSize:"18px"}}>{icon}</div>
            <div className="cl-cost-val">{val}</div>
            <div className="cl-cost-lbl">{lbl}</div>
          </div>
        ))}
      </div>

      {/* ── Sections ── */}
      {secs.map((sec,si)=>{
        const meta = SEC_META[sec.id]||{icon:"📌",color:"#8ba3bf",hint:""};
        const {t,d,pct:sp} = secProg(sec);
        const isComplete = d===t && t>0;
        const isOpen = !collapsed[sec.id];

        return (
          <div
            key={sec.id}
            id={"sec-" + sec.id}
            className={`cl-section fade-up${isComplete ? " complete" : ""}`}
            style={{ animationDelay: `${si * 0.03}s` }}
          >

            {/* Header */}
            <div className="cl-sec-header" onClick={()=>toggleSec(sec.id)}>
              <div className="cl-sec-icon" style={{background:`${meta.color}18`,border:`1px solid ${meta.color}28`}}>
                {meta.icon}
              </div>
              <div className="cl-sec-info">
                <div className="cl-sec-title">
                  {sec.title}
                  {isComplete && <span style={{marginLeft:8,fontSize:"13px"}}>✅</span>}
                </div>
                <div className="cl-sec-hint">{meta.hint}</div>
              </div>
              <div className="cl-sec-right">
                {editMode && <button className="cl-sec-del" onClick={e=>{e.stopPropagation();delSec(si);}}>✕</button>}
                <div>
                  <div className={`cl-sec-count${isComplete?" done":""}`}>{d}/{t}</div>
                  <div className="cl-sec-bar">
                    <div className="cl-sec-bar-fill" style={{width:sp+"%",background:meta.color}}/>
                  </div>
                </div>
                <span className={`cl-chevron${isOpen?" open":""}`}>▾</span>
              </div>
            </div>

            {/* Items */}
            {isOpen && (
              <div className="cl-items">
                {sec.items.map((item,ii)=>{
                  const isDone = !!checks[item.n];
                  const isEditing = editItem?.si===si && editItem?.ii===ii;
                  const expKey = `${si}-${ii}`;
                  const isExp = !!expanded[expKey];

                  return (
                    <div key={item.n} className={`cl-item${isDone?" done":""}`}
                      onClick={()=>{ if(!editMode&&!isEditing) toggleCheck(item.n); }}>

                      <span className="cl-item-num">#{item.n}</span>

                      <div className={`cl-cb${isDone?" on":""}`}
                        onClick={e=>{e.stopPropagation();toggleCheck(item.n);}}>
                        {isDone && (
                          <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
                            <path d="M1 5L4.5 8.5L11 1" stroke="#065f46" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
                          </svg>
                        )}
                      </div>

                      {isEditing ? (
                        <div className="cl-edit-form" onClick={e=>e.stopPropagation()}>
                          <input className="cl-input" value={editDraft.name} placeholder="Item name" onChange={e=>setEditDraft(p=>({...p,name:e.target.value}))}/>
                          <input className="cl-input" value={editDraft.model||""} placeholder="Model / spec" onChange={e=>setEditDraft(p=>({...p,model:e.target.value}))}/>
                          <input className="cl-input" value={editDraft.detail||""} placeholder="Plain English description" onChange={e=>setEditDraft(p=>({...p,detail:e.target.value}))}/>
                          <div className="cl-form-row">
                            <input className="cl-input" style={{maxWidth:100}} value={editDraft.price||""} placeholder="Price" onChange={e=>setEditDraft(p=>({...p,price:e.target.value}))}/>
                            <label style={{fontSize:"13px",color:"var(--text2)",display:"flex",alignItems:"center",gap:5,cursor:"pointer",whiteSpace:"nowrap"}}>
                              <input type="checkbox" checked={!!editDraft.warn} onChange={e=>setEditDraft(p=>({...p,warn:e.target.checked}))}/>
                              ⚠️ Pending
                            </label>
                            <button className="cl-btn cl-btn-success" style={{padding:"6px 12px",fontSize:"13px"}} onClick={commitEdit}>Save</button>
                            <button className="cl-btn cl-btn-ghost" style={{padding:"6px 12px",fontSize:"13px"}} onClick={()=>setEditItem(null)}>Cancel</button>
                          </div>
                        </div>
                      ) : (
                        <div className="cl-item-body">
                          <div className="cl-item-name">
                            {item.name}
                            {item.warn && <span className="cl-tag tag-warn">⚠ Pending</span>}
                            {item.price==="FREE" && !isDone && <span className="cl-tag tag-free">FREE</span>}
                          </div>
                          {item.model && <div className="cl-item-model">{item.model}</div>}
                          {item.detail && (
                            <>
                              <button className="cl-expand-btn" onClick={e=>{e.stopPropagation();toggleExp(expKey);}}>
                                {isExp?"▾ Hide":"▸ What is this?"}
                              </button>
                              <div className={`cl-item-detail${isExp?" open":""}`}>{item.detail}</div>
                            </>
                          )}
                        </div>
                      )}

                      {!isEditing && (
                        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5,flexShrink:0}}>
                          <span className={`cl-item-price ${item.price==="FREE"?"price-free":item.price==="—"?"price-dash":"price-cost"}`}>
                            {item.price}
                          </span>
                          {editMode && (
                            <div className="cl-edit-btns">
                              <button className="cl-edit-btn edit" onClick={e=>{e.stopPropagation();startEdit(si,ii,item);}}>✏</button>
                              <button className="cl-edit-btn del"  onClick={e=>{e.stopPropagation();delItem(si,ii);}}>✕</button>
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}

                {/* Add item row */}
                {editMode && (
                  <div className="cl-add-row">
                    {addingSec===si ? (
                      <div style={{display:"flex",flexDirection:"column",gap:8}} onClick={e=>e.stopPropagation()}>
                        <input className="cl-input" value={newItem.name} placeholder="Item name *" onChange={e=>setNewItem(p=>({...p,name:e.target.value}))}/>
                        <input className="cl-input" value={newItem.model} placeholder="Model / spec" onChange={e=>setNewItem(p=>({...p,model:e.target.value}))}/>
                        <input className="cl-input" value={newItem.detail} placeholder="Plain English description" onChange={e=>setNewItem(p=>({...p,detail:e.target.value}))}/>
                        <div className="cl-form-row">
                          <input className="cl-input" style={{maxWidth:100}} value={newItem.price} placeholder="Price" onChange={e=>setNewItem(p=>({...p,price:e.target.value}))}/>
                          <label style={{fontSize:"13px",color:"var(--text2)",display:"flex",alignItems:"center",gap:5,cursor:"pointer"}}>
                            <input type="checkbox" checked={newItem.warn} onChange={e=>setNewItem(p=>({...p,warn:e.target.checked}))}/>⚠️ Pending
                          </label>
                          <button className="cl-btn cl-btn-success" style={{padding:"6px 12px",fontSize:"13px"}} onClick={()=>commitAdd(si)}>Add</button>
                          <button className="cl-btn cl-btn-ghost" style={{padding:"6px 12px",fontSize:"13px"}} onClick={()=>{setAddingSec(null);setNewItem({name:"",model:"",detail:"",price:"",warn:false});}}>Cancel</button>
                        </div>
                      </div>
                    ) : (
                      <button className="cl-add-btn" onClick={()=>setAddingSec(si)}>+ Add item to {sec.title}</button>
                    )}
                  </div>
                )}
              </div>
            )}
          </div>
        );
      })}

      {/* Add section */}
      {editMode && (
        <div className="cl-add-section">
          <div style={{fontSize:"12px",color:"var(--text3)",marginBottom:10,fontFamily:"var(--mono)",textTransform:"uppercase",letterSpacing:"0.06em"}}>+ New Section</div>
          <div style={{display:"flex",gap:8}}>
            <input className="cl-input" style={{flex:1}} value={newSecTitle} placeholder="Section title e.g. Cabling" onChange={e=>setNewSecTitle(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addSec()}/>
            <button className="cl-btn cl-btn-primary" onClick={addSec}>Add</button>
          </div>
        </div>
      )}

      {/* Footer */}
      <div className="cl-footer">Diyar Hussein 2026</div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("cl-root")).render(<App/>);
</script>
