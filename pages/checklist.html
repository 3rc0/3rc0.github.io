{% raw %}
<style>
/*
 * checklist.css — scoped component styles
 * Strategy: ALL rules prefixed with #cl-app so they never
 * touch the rest of the Beautiful Jekyll / Bootstrap theme.
 * No !important used except in @media print where it's standard.
 * Bootstrap + Beautiful Jekyll conflicts neutralised by scoping,
 * not by overriding global selectors.
 */

/* ── Scoped reset: neutralise Bootstrap/Jekyll inheritance ── */
#cl-app {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
/* Force font on all descendants — beats any monospace/serif parent Jekyll wraps content in */
#cl-app, #cl-app * {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-size: 16px;
  line-height: 1.6;
  color: #e2eaf4;
  max-width: 680px;
  margin: 0 auto;
  padding: 0 0 60px;
  box-sizing: border-box;
}
#cl-app *, #cl-app *::before, #cl-app *::after { box-sizing: border-box; }

/* Bootstrap bleeds: p margins, anchor colours, heading fonts */
#cl-app p      { margin: 0; line-height: inherit; font-family: inherit; }
#cl-app a      { color: inherit; text-decoration: none; font-family: inherit; }
#cl-app h2     { font-family: inherit; font-weight: 700; line-height: 1.2; margin: 0; font-size: inherit; }
#cl-app button { font-family: inherit; }
#cl-app input  { font-family: inherit; }
#cl-app label  { font-family: inherit; margin: 0; font-weight: inherit; }

/* ── CSS custom properties (prefixed cl- to avoid theme conflicts) ── */
#cl-app {
  --cl-glass:   rgba(255,255,255,0.04);
  --cl-glass2:  rgba(255,255,255,0.07);
  --cl-border:  rgba(255,255,255,0.08);
  --cl-border2: rgba(255,255,255,0.14);
  --cl-accent:  #38bdf8;
  --cl-green:   #34d399;
  --cl-orange:  #fb923c;
  --cl-red:     #f87171;
  --cl-purple:  #a78bfa;
  --cl-text:    #e2eaf4;
  --cl-text2:   #8ba3bf;
  --cl-text3:   #4d6a85;
  --cl-done-bg: rgba(52,211,153,0.07);
  --cl-radius:  14px;
  --cl-mono:    "SF Mono","Fira Code","Consolas",monospace;
}

#cl-app .cl-ring-label,
#cl-app .cl-user-badge,
#cl-app .cl-item-num,
#cl-app .cl-item-model,
#cl-app .cl-item-price,
#cl-app .cl-cost-val,
#cl-app .cl-sec-count,
#cl-app .cl-log-time,
#cl-app .cl-log-action,
#cl-app .cl-saving,
#cl-app .cl-tag {
  font-family: "SF Mono", "Fira Code", "Consolas", monospace;
}
@keyframes cl-fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes cl-spin   { to{transform:rotate(360deg)} }
@keyframes cl-shake  { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
#cl-app .fade-up { animation: cl-fadeUp 0.3s ease both; }
#cl-app .shake   { animation: cl-shake 0.35s ease; }

/* ── Auth card ── */
#cl-app .cl-auth      { max-width: 400px; margin: 0 auto; padding-top: 20px; }
#cl-app .cl-auth-card {
  background: linear-gradient(135deg,#0f2240,#0a1628);
  border: 1px solid var(--cl-border2); border-radius: 20px;
  padding: 36px 28px; position: relative; overflow: hidden;
}
#cl-app .cl-auth-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background: linear-gradient(90deg,var(--cl-accent),var(--cl-green),var(--cl-purple),var(--cl-orange));
}
#cl-app .cl-auth-logo  { font-size: 36px; text-align: center; margin-bottom: 10px; }
#cl-app .cl-auth-title { font-size: 22px; font-weight: 700; color: #fff; text-align: center; margin-bottom: 6px; }
#cl-app .cl-auth-sub   { font-size: 15px; color: var(--cl-text2); text-align: center; margin-bottom: 24px; }
#cl-app .cl-tabs  { display: flex; gap: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; padding: 4px; margin-bottom: 22px; }
#cl-app .cl-tab   { flex:1; padding: 10px; border: none; border-radius: 8px; background: transparent; color: var(--cl-text2); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
#cl-app .cl-tab.active { background: rgba(56,189,248,0.15); color: var(--cl-accent); }
#cl-app .cl-field     { margin-bottom: 16px; }
#cl-app .cl-label     { font-size: 13px; font-weight: 600; color: var(--cl-text2); margin-bottom: 6px; display: block; letter-spacing: 0.04em; text-transform: uppercase; }
#cl-app .cl-input {
  width: 100%; background: rgba(255,255,255,0.06); border: 1px solid var(--cl-border2);
  color: var(--cl-text); border-radius: 10px; padding: 13px 16px; font-size: 16px; transition: all 0.2s;
}
#cl-app .cl-input:focus { outline: none; border-color: var(--cl-accent); box-shadow: 0 0 0 3px rgba(56,189,248,0.12); }
#cl-app .cl-input.error { border-color: var(--cl-red); box-shadow: 0 0 0 3px rgba(248,113,113,0.12); }
#cl-app .cl-input-hint  { font-size: 13px; color: var(--cl-text3); margin-top: 5px; }
#cl-app .cl-auth-error  { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2); border-radius: 8px; padding: 12px 14px; font-size: 14px; color: var(--cl-red); margin-bottom: 16px; display: none; }
#cl-app .cl-auth-error.show { display: block; }

/* ── Buttons ── */
#cl-app .cl-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 11px 20px; border-radius: 10px; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all 0.15s; border: none; text-decoration: none; line-height: 1;
}
#cl-app .cl-btn:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
#cl-app .cl-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
#cl-app .cl-btn-full    { width: 100%; }
#cl-app .cl-btn-primary { background: linear-gradient(135deg,#0ea5e9,#38bdf8); color: #0a1628; font-weight: 700; }
#cl-app .cl-btn-ghost   { background: rgba(255,255,255,0.05); color: var(--cl-text2); border: 1px solid var(--cl-border); }
#cl-app .cl-btn-danger  { background: rgba(248,113,113,0.08); color: var(--cl-red);    border: 1px solid rgba(248,113,113,0.2); }
#cl-app .cl-btn-success { background: rgba(52,211,153,0.12);  color: var(--cl-green);  border: 1px solid rgba(52,211,153,0.3); }
#cl-app .cl-btn-warn    { background: rgba(251,146,60,0.12);  color: var(--cl-orange); border: 1px solid rgba(251,146,60,0.3); }
#cl-app .cl-btn-sm      { padding: 7px 14px; font-size: 13px; }

/* ── App header ── */
#cl-app .cl-header {
  background: linear-gradient(135deg,#0f2240,#0a1628);
  border: 1px solid var(--cl-border2); border-radius: var(--cl-radius);
  padding: 20px 22px; margin-bottom: 14px; position: relative; overflow: hidden;
}
#cl-app .cl-header::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background: linear-gradient(90deg,var(--cl-accent),var(--cl-green),var(--cl-purple),var(--cl-orange));
}
#cl-app .cl-header-top        { display: flex; align-items: center; gap: 16px; }
#cl-app .cl-ring              { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
#cl-app .cl-ring svg          { transform: rotate(-90deg); display: block; }
#cl-app .cl-ring-label        { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; font-family: var(--cl-mono); }
#cl-app .cl-title-block       { flex: 1; min-width: 0; }
#cl-app .cl-title-block h2    { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 3px; letter-spacing: -0.01em; }
#cl-app .cl-user-badge        { font-size: 13px; color: var(--cl-accent); margin-bottom: 6px; font-family: var(--cl-mono); }
#cl-app .cl-progress-bar      { height: 4px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; margin-top: 8px; }
#cl-app .cl-progress-fill     { height: 100%; background: linear-gradient(90deg,var(--cl-accent),var(--cl-green)); border-radius: 99px; transition: width 0.5s ease; }
#cl-app .cl-header-actions    { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--cl-border); }

/* ── Cost strip ── */
#cl-app .cl-costs     { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 14px; }
#cl-app .cl-cost-card { background: var(--cl-glass); border: 1px solid var(--cl-border); border-radius: 12px; padding: 12px; text-align: center; }
#cl-app .cl-cost-val  { font-size: 14px; font-weight: 700; color: var(--cl-orange); font-family: var(--cl-mono); }
#cl-app .cl-cost-lbl  { font-size: 12px; color: var(--cl-text3); margin-top: 3px; }

/* ── Sections ── */
#cl-app .cl-section          { background: var(--cl-glass); border: 1px solid var(--cl-border); border-radius: var(--cl-radius); margin-bottom: 10px; overflow: hidden; transition: border-color 0.2s; }
#cl-app .cl-section:hover    { border-color: var(--cl-border2); }
#cl-app .cl-section.complete { border-color: rgba(52,211,153,0.25); }
#cl-app .cl-sec-header       { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; user-select: none; transition: background 0.15s; }
#cl-app .cl-sec-header:hover { background: var(--cl-glass2); }
#cl-app .cl-sec-icon         { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
#cl-app .cl-sec-info         { flex: 1; min-width: 0; }
#cl-app .cl-sec-title        { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 2px; }
#cl-app .cl-sec-hint         { font-size: 13px; color: var(--cl-text3); }
#cl-app .cl-sec-right        { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
#cl-app .cl-sec-count        { font-size: 13px; color: var(--cl-text3); font-weight: 600; font-family: var(--cl-mono); }
#cl-app .cl-sec-count.done   { color: var(--cl-green); }
#cl-app .cl-sec-bar          { width: 44px; height: 3px; background: rgba(255,255,255,0.07); border-radius: 99px; overflow: hidden; }
#cl-app .cl-sec-bar-fill     { height: 100%; border-radius: 99px; transition: width 0.4s; }
#cl-app .cl-chevron          { color: var(--cl-text3); font-size: 14px; transition: transform 0.2s; display: inline-block; }
#cl-app .cl-chevron.open     { transform: rotate(180deg); }

/* ── Items ── */
#cl-app .cl-items                      { border-top: 1px solid rgba(255,255,255,0.06); }
#cl-app .cl-item                       { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: background 0.15s; }
#cl-app .cl-item:last-child            { border-bottom: none; }
#cl-app .cl-item:hover                 { background: var(--cl-glass2); }
#cl-app .cl-item.done                  { background: var(--cl-done-bg); }
#cl-app .cl-item.done .cl-item-name   { text-decoration: line-through; color: var(--cl-green); opacity: 0.7; }
#cl-app .cl-item.done .cl-item-model  { text-decoration: line-through; opacity: 0.4; }
#cl-app .cl-item.done .cl-item-price  { opacity: 0.35; text-decoration: line-through; }
#cl-app .cl-item-num                   { font-size: 12px; font-weight: 700; color: rgba(56,189,248,0.4); width: 24px; text-align: right; flex-shrink: 0; padding-top: 3px; font-family: var(--cl-mono); }
#cl-app .cl-item.done .cl-item-num    { color: var(--cl-green); opacity: 0.6; }
#cl-app .cl-cb                         { width: 24px; height: 24px; border-radius: 7px; border: 2px solid var(--cl-text3); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; background: transparent; cursor: pointer; }
#cl-app .cl-cb.on                      { background: var(--cl-green); border-color: var(--cl-green); }
#cl-app .cl-item-body                  { flex: 1; min-width: 0; }
#cl-app .cl-item-name                  { font-size: 16px; font-weight: 600; color: #fff; line-height: 1.4; display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
#cl-app .cl-item-model                 { font-size: 13px; color: var(--cl-accent); margin-top: 3px; opacity: 0.9; font-family: var(--cl-mono); }
#cl-app .cl-item-detail                { font-size: 14px; color: var(--cl-text2); margin-top: 6px; line-height: 1.6; display: none; }
#cl-app .cl-item-detail.open          { display: block; }
#cl-app .cl-expand-btn                 { font-size: 13px; color: var(--cl-text3); cursor: pointer; margin-top: 4px; display: inline-flex; align-items: center; gap: 3px; background: none; border: none; padding: 0; transition: color 0.15s; }
#cl-app .cl-expand-btn:hover          { color: var(--cl-accent); }
#cl-app .cl-item-right                 { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
#cl-app .cl-item-price                 { font-size: 14px; font-weight: 700; white-space: nowrap; font-family: var(--cl-mono); }
#cl-app .price-free                    { color: var(--cl-green); }
#cl-app .price-dash                    { color: var(--cl-text3); }
#cl-app .price-cost                    { color: var(--cl-orange); }

/* ── Tags ── */
#cl-app .cl-tag   { display: inline-flex; align-items: center; gap: 3px; padding: 3px 8px; border-radius: 20px; font-size: 12px; font-weight: 700; font-family: var(--cl-mono); }
#cl-app .tag-warn { background: rgba(251,146,60,0.1); color: var(--cl-orange); border: 1px solid rgba(251,146,60,0.3); }
#cl-app .tag-free { background: rgba(52,211,153,0.1); color: var(--cl-green);  border: 1px solid rgba(52,211,153,0.2); }

/* ── Edit controls ── */
#cl-app .cl-edit-btns     { display: flex; gap: 4px; }
#cl-app .cl-edit-btn      { padding: 5px 10px; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; }
#cl-app .cl-edit-btn.edit { background: rgba(56,189,248,0.12); color: var(--cl-accent); border: 1px solid rgba(56,189,248,0.25); }
#cl-app .cl-edit-btn.del  { background: rgba(248,113,113,0.1);  color: var(--cl-red);    border: 1px solid rgba(248,113,113,0.2); }
#cl-app .cl-sec-del       { padding: 3px 9px; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; background: rgba(248,113,113,0.1); color: var(--cl-red); border: 1px solid rgba(248,113,113,0.2); }

/* ── Inline edit form ── */
#cl-app .cl-edit-form  { flex: 1; display: flex; flex-direction: column; gap: 8px; }
#cl-app .cl-form-input { background: rgba(255,255,255,0.06); border: 1px solid var(--cl-border2); color: var(--cl-text); border-radius: 8px; padding: 9px 12px; font-size: 14px; width: 100%; transition: all 0.2s; }
#cl-app .cl-form-input:focus { outline: none; border-color: var(--cl-accent); box-shadow: 0 0 0 2px rgba(56,189,248,0.1); }
#cl-app .cl-form-row   { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
#cl-app .cl-add-row    { padding: 10px 16px; border-top: 1px solid rgba(255,255,255,0.05); }
#cl-app .cl-add-btn    { width: 100%; padding: 11px; background: transparent; border: 1px dashed rgba(255,255,255,0.12); border-radius: 10px; color: var(--cl-text3); font-size: 14px; cursor: pointer; transition: all 0.2s; }
#cl-app .cl-add-btn:hover { border-color: var(--cl-accent); color: var(--cl-accent); }
#cl-app .cl-add-section { background: var(--cl-glass); border: 1px dashed var(--cl-border2); border-radius: var(--cl-radius); padding: 16px; margin-bottom: 10px; }

/* ── Toast (fixed position — outside #cl-app scope) ── */
.cl-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #162540; border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 12px 22px; font-size: 15px; font-weight: 600; color: #34d399; box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 9999; white-space: nowrap; animation: cl-fadeUp 0.2s ease; pointer-events: none; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }

/* ── Activity log ── */
#cl-app .cl-log-panel   { background: var(--cl-glass); border: 1px solid var(--cl-border); border-radius: var(--cl-radius); overflow: hidden; margin-bottom: 10px; }
#cl-app .cl-log-header  { padding: 14px 16px; border-bottom: 1px solid var(--cl-border); display: flex; align-items: center; justify-content: space-between; }
#cl-app .cl-log-title   { font-size: 15px; font-weight: 700; color: #fff; }
#cl-app .cl-log-empty   { padding: 24px; text-align: center; font-size: 14px; color: var(--cl-text3); }
#cl-app .cl-log-entry   { display: flex; gap: 10px; align-items: flex-start; padding: 11px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); }
#cl-app .cl-log-entry:last-child { border-bottom: none; }
#cl-app .cl-log-time    { font-size: 12px; color: var(--cl-text3); white-space: nowrap; padding-top: 2px; min-width: 100px; font-family: var(--cl-mono); }
#cl-app .cl-log-action  { font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 20px; flex-shrink: 0; font-family: var(--cl-mono); }
#cl-app .log-check      { background: rgba(52,211,153,0.1); color: var(--cl-green); }
#cl-app .log-uncheck    { background: rgba(248,113,113,0.1); color: var(--cl-red); }
#cl-app .log-edit       { background: rgba(56,189,248,0.1);  color: var(--cl-accent); }
#cl-app .log-login      { background: rgba(167,139,250,0.1); color: var(--cl-purple); }

#cl-app .cl-log-detail  { font-size: 14px; color: var(--cl-text2); flex: 1; }
#cl-app .cl-saving      { font-size: 12px; color: var(--cl-accent); text-align: center; padding: 4px; opacity: 0.7; font-family: var(--cl-mono); }
#cl-app .cl-spinner     { width: 32px; height: 32px; border: 3px solid rgba(56,189,248,0.2); border-top-color: #38bdf8; border-radius: 50%; animation: cl-spin 0.8s linear infinite; margin: 0 auto 14px; }

// ── Session storage (sessionStorage — no cross-tab persistence) ──
function loadSession() {
  try { return JSON.parse(sessionStorage.getItem(STORE_KEY)); } catch(e) { return null; }
}
function saveSession(s) {
  try { sessionStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch(e) {}
}
function clearSession() {
  try { sessionStorage.removeItem(STORE_KEY); } catch(e) {}
}

// ── API ──────────────────────────────────────────────
async function apiFetch(path, opts) {
  const headers = { "Content-Type": "application/json", ...(opts && opts.headers || {}) };
  if (state.session) headers["X-Session-Token"] = state.session.token;
  const r = await fetch(API + path, { method: opts && opts.method || "GET", headers, body: opts && opts.body });
  return r.json();
}

// ── Toast ────────────────────────────────────────────
let toastTimer;
function toast(msg, color) {
  let t = document.getElementById("cl-toast");
  if (!t) { t = document.createElement("div"); t.id = "cl-toast"; t.className = "cl-toast"; document.body.appendChild(t); }
  t.textContent = msg;
  t.style.color = color || "var(--green)";
  t.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.display = "none"; }, 2500);
}

// ── Render helpers ───────────────────────────────────
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === "class") el.className = v;
    else if (k === "style") el.style.cssText = v;
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c === null || c === undefined) return;
    el.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return el;
}

function ring(pct) {
  const size=60, stroke=5, r=(size-stroke*2)/2, circ=2*Math.PI*r;
  const color = pct===100?"#34d399":"#38bdf8";
  const offset = circ*(1-pct/100);
  const wrap = h("div",{"class":"cl-ring"});
  wrap.innerHTML = `
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="transform:rotate(-90deg)">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
        stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
        style="transition:stroke-dashoffset 0.6s ease"/>
    </svg>
    <div class="cl-ring-label" style="color:${color}">${pct}%</div>`;
  return wrap;
}

// ── Auth view ────────────────────────────────────────
function renderAuth() {
  const isLogin = state.authTab === "login";
  const wrap = h("div",{"class":"cl-auth fade-up"});
  const card = h("div",{"class":"cl-auth-card"});

  const logo  = h("div",{"class":"cl-auth-logo"},"🔐");
  const title = h("div",{"class":"cl-auth-title"},"Home Security Checklist");
  const sub   = h("div",{"class":"cl-auth-sub"},"Sign in to access your personal checklist");

  const tabs = h("div",{"class":"cl-tabs"},
    h("button",{"class":"cl-tab"+(isLogin?" active":""), onClick:()=>{ state.authTab="login"; render(); }},"Sign In"),
    h("button",{"class":"cl-tab"+(!isLogin?" active":""), onClick:()=>{ state.authTab="register"; render(); }},"Create Account"),
  );

  const errBox = h("div",{"class":"cl-auth-error","id":"cl-auth-err"});

  const userField = h("div",{"class":"cl-field"},
    h("label",{"class":"cl-label"},"Username"),
    h("input",{"class":"cl-input","id":"cl-user","type":"text","placeholder":"your_username","autocomplete":"username","maxlength":"30"}),
    !isLogin ? h("div",{"class":"cl-input-hint"},"3–30 characters, letters/numbers/dash/underscore only") : null,
  );

  const passField = h("div",{"class":"cl-field"},
    h("label",{"class":"cl-label"},"Password"),
    h("input",{"class":"cl-input","id":"cl-pass","type":"password","placeholder":"••••••••","autocomplete":isLogin?"current-password":"new-password","maxlength":"100"}),
    !isLogin ? h("div",{"class":"cl-input-hint"},"Minimum 8 characters") : null,
  );

  const submitBtn = h("button",{"class":"cl-btn cl-btn-primary cl-btn-full","id":"cl-auth-btn",
    onClick: async () => {
      const username = document.getElementById("cl-user").value.trim().toLowerCase();
      const password = document.getElementById("cl-pass").value;
      const err = document.getElementById("cl-auth-err");
      const btn = document.getElementById("cl-auth-btn");
      err.className = "cl-auth-error";
      if (!username || !password) { showAuthErr("Please enter username and password."); return; }
      btn.disabled = true;
      btn.textContent = isLogin ? "Signing in…" : "Creating account…";
      try {
        const d = await apiFetch(isLogin ? "/api/login" : "/api/register", {
          method:"POST", body: JSON.stringify({username, password})
        });
        if (d.locked) { showAuthErr("Too many failed attempts. Try again in 15 minutes."); btn.disabled=false; btn.textContent=isLogin?"Sign In":"Create Account"; return; }
        if (!d.ok) { showAuthErr(d.error || "Something went wrong."); btn.disabled=false; btn.textContent=isLogin?"Sign In":"Create Account"; return; }
        if (isLogin) {
          state.session = {token: d.token, username: d.username};
          saveSession(state.session);
          await loadUserData();
          state.view = "app";
          render();
        } else {
          toast("Account created! Please sign in.");
          state.authTab = "login";
          render();
        }
      } catch(e) {
        showAuthErr("Could not connect to server. Try again.");
        btn.disabled=false; btn.textContent=isLogin?"Sign In":"Create Account";
      }
    }
  }, isLogin ? "Sign In" : "Create Account");

  function showAuthErr(msg) {
    const e = document.getElementById("cl-auth-err");
    if (e) { e.textContent = msg; e.className = "cl-auth-error show"; }
  }

  const fields = isLogin ? [userField, passField] : [userField, passField];
  card.append(logo, title, sub, tabs, errBox, ...fields, submitBtn);
  wrap.appendChild(card);
  return wrap;
}

// ── Load user data from API ──────────────────────────
async function loadUserData() {
  try {
    const d = await apiFetch("/api/data");
    if (d.ok !== false) {
      state.sections = d.sections || DEFAULT_SECTIONS;
      state.checks   = d.checks   || {};
    }
  } catch(e) {}
}

// ── Save to API ──────────────────────────────────────
async function saveData(key, value, logEntry) {
  state.saving = true; renderSaving();
  try {
    await apiFetch("/api/save", {
      method:"POST",
      body: JSON.stringify({key, value, entry: logEntry})
    });
  } catch(e) {}
  state.saving = false; renderSaving();
}

function renderSaving() {
  const el = document.getElementById("cl-saving");
  if (el) el.style.display = state.saving ? "block" : "none";
}

// ── Progress calc ────────────────────────────────────
function calcProgress() {
  const all   = state.sections.flatMap(s=>s.items);
  const done  = all.filter(i=>state.checks[i.n]);
  const pct   = all.length ? Math.round(done.length/all.length*100) : 0;
  return {total:all.length, done:done.length, pct};
}
function secProg(sec) {
  const t=sec.items.length, d=sec.items.filter(i=>state.checks[i.n]).length;
  return {t, d, pct:t?Math.round(d/t*100):0};
}
function renumber(secs) {
  let n=1; return secs.map(s=>({...s,items:s.items.map(i=>({...i,n:n++}))}));
}

function renderHeader() {
  const {total,done,pct} = calcProgress();
  const wrap = h("div",{"class":"cl-header fade-up"});

  const top = h("div",{"class":"cl-header-top"},
    ring(pct),
    h("div",{"class":"cl-title-block"},
      h("h2",{},"Home Security Checklist"),
      h("div",{"class":"cl-user-badge"},"👤 "+state.session.username),
      h("div",{},`${done} of ${total} tasks completed`),
      h("div",{"class":"cl-progress-bar","style":"margin-top:6px"},
        h("div",{"class":"cl-progress-fill","style":`width:${pct}%`})
      )
    )
  );

  const editBtn = h("button",{"class":"cl-btn "+(state.editMode?"cl-btn-warn":"cl-btn-ghost"),
    onClick:()=>{ state.editMode=!state.editMode; state.editItem=null; state.addingSec=null; render(); }},
    state.editMode ? "✓ Done Editing" : "✏️ Edit");

  const logBtn = h("button",{"class":"cl-btn cl-btn-ghost",
    onClick: async ()=>{
      if (!state.showLog) {
        const d = await apiFetch("/api/log");
        state.logs = d.logs || [];
      }
      state.showLog = !state.showLog;
      render();
    }}, state.showLog ? "✕ Close Log" : "📋 Activity Log");

  const printBtn = h("button",{"class":"cl-btn cl-btn-success",
    onClick:()=>{ state.collapsed={}; setTimeout(()=>window.print(),300); }},
    "🖨️ Print PDF");

  const logoutBtn = h("button",{"class":"cl-btn cl-btn-danger",
    onClick: async ()=>{
      await apiFetch("/api/logout",{method:"POST"});
      clearSession();
      state.session=null; state.checks={}; state.sections=DEFAULT_SECTIONS;
      state.editMode=false; state.showLog=false; state.view="auth";
      render();
    }}, "Sign Out");

  const actions = h("div",{"class":"cl-header-actions"}, editBtn, logBtn, printBtn, logoutBtn);
  const saving  = h("div",{"class":"cl-saving","id":"cl-saving","style":"display:none"},"● syncing…");
  wrap.append(top, actions, saving);
  return wrap;
}

// ── Render log ───────────────────────────────────────
function renderLog() {
  const panel = h("div",{"class":"cl-log-panel fade-up"});
  const hdr   = h("div",{"class":"cl-log-header"},
    h("div",{"class":"cl-log-title"},"📋 Activity Log"),
    h("div",{"class":"cl-saving","style":"font-size:11px;color:var(--text3)"},
      `${state.logs.length} entries`)
  );
  panel.appendChild(hdr);
  if (!state.logs.length) {
    panel.appendChild(h("div",{"class":"cl-log-empty"},"No activity yet."));
    return panel;
  }
  const actionClass = {
    check:"log-check", uncheck:"log-uncheck", login:"log-login",
    register:"log-register", logout:"log-login",
    "add-item":"log-edit","del-item":"log-edit","edit-item":"log-edit",
    "add-section":"log-edit","del-section":"log-edit",
  };
  state.logs.slice(0,50).forEach(entry => {
    const d   = new Date(entry.ts);
    const ts  = d.toLocaleDateString()+" "+d.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
    const cls = actionClass[entry.action] || "log-edit";
    panel.appendChild(h("div",{"class":"cl-log-entry"},
      h("div",{"class":"cl-log-time"},ts),
      h("div",{"class":"cl-log-action "+cls},entry.action),
      h("div",{"class":"cl-log-detail"},entry.detail)
    ));
  });
  return panel;
}

function renderChecklist() {

    const {t,d,pct:sp} = secProg(sec);
    const isComplete   = d===t && t>0;
    const isOpen       = !state.collapsed[sec.id];

    const secEl = h("div",{"class":"cl-section fade-up"+(isComplete?" complete":""),"id":"sec-"+sec.id,"style":`animation-delay:${si*0.03}s`});

    // Section header

      h("div",{"class":"cl-sec-info"},
        h("div",{"class":"cl-sec-title"},sec.title, isComplete?" ✅":""),
        h("div",{"class":"cl-sec-hint"},meta.hint)
      ),
      h("div",{"class":"cl-sec-right"},
        state.editMode ? h("button",{"class":"cl-sec-del",
          onClick:async e=>{ e.stopPropagation();

          }},"✕") : null,

        h("span",{"class":"cl-chevron"+(isOpen?" open":"")},"▾")

          const form = h("div",{"class":"cl-edit-form"},nameI,modelI,detI,h("div",{"class":"cl-form-row"},priceI,h("label",{"style":"font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px;cursor:pointer"},warnI,"⚠ Pending"),saveBtn,cancelBtn));

        } else {

              h("button",{"class":"cl-edit-btn edit",onClick:e=>{e.stopPropagation();state.editItem={si,ii};state.editDraft={...item};render();}},  "✏"),

          warnI.onchange = e=>{ state.newItem.warn   =e.target.checked; };

      onClick:async()=>{

        const nx=[...state.sections,{id:ids[state.sections.length]||String(state.sections.length+1),title:inp.value.trim(),items:[]}];

// ── Main render ──────────────────────────────────────
function render() {
  const root = document.getElementById("cl-root");
  root.innerHTML = "";
  if (state.view === "loading") {
    root.innerHTML = `<div style="text-align:center;padding:60px 0;color:#38bdf8;font-family:monospace;font-size:14px"><div class="cl-spinner"></div>Loading…</div>`;
    return;
  }
  if (state.view === "auth") {
    root.appendChild(renderAuth());
    return;
  }
  if (state.view === "app") {
    root.appendChild(renderChecklist());
    return;
  }
}

// ── Boot ─────────────────────────────────────────────
async function boot() {
  state.view = "loading";
  render();
  const saved = loadSession();
  if (saved && saved.token) {
    state.session = saved;
    try {
      const d = await apiFetch("/api/data");
      if (d.ok === false && d.error === "Not authenticated") {
        clearSession(); state.session = null; state.view = "auth";
      } else {
        state.sections = d.sections || DEFAULT_SECTIONS;
        state.checks   = d.checks   || {};
        state.view = "app";
      }
    } catch(e) {
      clearSession(); state.session = null; state.view = "auth";
    }
  } else {
    state.view = "auth";
  }
  render();
}

boot();
})();
</script>
